<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>São Paulo FC — Acompanhamento de Jogos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --vermelho: #CC0000;
    --branco: #F5F0E8;
    --preto: #0A0A0A;
    --cinza-escuro: #141414;
    --cinza-medio: #222222;
    --cinza-claro: #333333;
    --dourado: #C8A84B;
    --texto: #E8E0D0;
    --texto-suave: #888880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--preto);
    color: var(--texto);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: relative;
    padding: 0;
    overflow: hidden;
    background: var(--cinza-escuro);
    border-bottom: 1px solid #1e1e1e;
  }

  .header-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 100% at 50% 0%, rgba(204,0,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    z-index: 1;
  }

  .escudo {
    width: 64px;
    height: 64px;
    flex-shrink: 0;
  }

  .escudo svg {
    width: 100%;
    height: 100%;
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.04em;
    color: var(--branco);
    line-height: 1;
  }

  .header-text p {
    font-size: 0.78rem;
    color: var(--texto-suave);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
    font-weight: 300;
  }

  .header-right {
    margin-left: auto;
    text-align: right;
  }

  .btn-atualizar {
    background: var(--vermelho);
    color: #fff;
    border: none;
    padding: 0.55rem 1.3rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-atualizar:hover { background: #aa0000; }
  .btn-atualizar:active { transform: scale(0.97); }
  .btn-atualizar.loading { opacity: 0.6; pointer-events: none; }

  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ultima-atualizacao {
    font-size: 0.72rem;
    color: var(--texto-suave);
    margin-top: 0.4rem;
  }

  /* TABS */
  .tabs {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    gap: 0;
    border-bottom: 1px solid #1e1e1e;
    position: relative;
  }

  .tab {
    padding: 1rem 1.4rem;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--texto-suave);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab.active {
    color: var(--branco);
    border-bottom-color: var(--vermelho);
  }

  .tab:hover:not(.active) { color: var(--texto); }

  /* MAIN CONTENT */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--texto-suave);
    background: var(--cinza-medio);
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--texto-suave);
  }

  .dot.verde { background: #4CAF50; animation: pulse-green 2s infinite; }
  .dot.vermelho { background: var(--vermelho); }

  @keyframes pulse-green {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* GAME CARD */
  .jogos-grid {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
  }

  .jogo-card {
    background: var(--cinza-escuro);
    padding: 1.4rem 1.8rem;
    display: grid;
    grid-template-columns: 160px 1fr 160px;
    align-items: center;
    gap: 1rem;
    transition: background 0.15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .jogo-card:hover { background: var(--cinza-medio); }

  .jogo-card.ao-vivo {
    background: linear-gradient(90deg, rgba(204,0,0,0.06) 0%, var(--cinza-escuro) 50%);
    border-left: 3px solid var(--vermelho);
  }

  .jogo-card.ao-vivo:hover {
    background: linear-gradient(90deg, rgba(204,0,0,0.1) 0%, var(--cinza-medio) 50%);
  }

  .jogo-meta {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .jogo-competicao {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dourado);
  }

  .jogo-data {
    font-size: 0.78rem;
    color: var(--texto-suave);
  }

  .jogo-status {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--texto-suave);
    margin-top: 0.2rem;
  }

  .jogo-status.live {
    color: var(--vermelho);
  }

  .jogo-status.vitoria { color: #4CAF50; }
  .jogo-status.derrota { color: var(--vermelho); }
  .jogo-status.empate { color: var(--dourado); }

  /* PLACAR */
  .placar-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
  }

  .time-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    min-width: 80px;
  }

  .time-escudo {
    width: 40px;
    height: 40px;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  .time-nome {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-align: center;
    color: var(--texto);
  }

  .placar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .placar-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    line-height: 1;
    color: var(--branco);
    min-width: 2ch;
    text-align: center;
  }

  .placar-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--cinza-claro);
    line-height: 1;
  }

  /* PARTIDA FUTURA */
  .placar-futuro {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    color: var(--texto-suave);
  }

  /* JOGO DETALHE */
  .jogo-detalhe {
    text-align: right;
  }

  .jogo-estadio {
    font-size: 0.72rem;
    color: var(--texto-suave);
  }

  .jogo-hora {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--branco);
    line-height: 1.1;
  }

  /* LOADING */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5rem 2rem;
    gap: 1rem;
    color: var(--texto-suave);
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--cinza-claro);
    border-top-color: var(--vermelho);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* ERROR */
  .error-state {
    background: rgba(204,0,0,0.06);
    border: 1px solid rgba(204,0,0,0.2);
    border-radius: 6px;
    padding: 2rem;
    text-align: center;
  }

  .error-state h3 { color: var(--vermelho); margin-bottom: 0.5rem; }
  .error-state p { color: var(--texto-suave); font-size: 0.85rem; }

  /* NOTICIAS */
  .noticias-hero {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 1px;
  }

  .noticia-destaque {
    position: relative;
    min-height: 340px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .noticia-destaque-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .noticia-destaque:hover .noticia-destaque-img { transform: scale(1.04); }

  .noticia-destaque-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
  }

  .noticia-destaque-body {
    position: relative;
    z-index: 1;
    padding: 1.5rem;
  }

  .noticia-destaque-body .tag {
    display: inline-block;
    background: var(--vermelho);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    margin-bottom: 0.6rem;
  }

  .noticia-destaque-body h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    line-height: 1.1;
    color: var(--branco);
    margin-bottom: 0.4rem;
    letter-spacing: 0.02em;
  }

  .noticia-destaque-body .meta {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.55);
  }

  /* LISTA LATERAL */
  .noticias-lista-lateral {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: #1a1a1a;
  }

  .noticia-item-lateral {
    background: var(--cinza-escuro);
    padding: 1rem 1.2rem;
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    flex: 1;
  }

  .noticia-item-lateral:hover { background: var(--cinza-medio); }

  .noticia-item-lateral img {
    width: 72px;
    height: 52px;
    object-fit: cover;
    border-radius: 3px;
    flex-shrink: 0;
    background: var(--cinza-claro);
  }

  .noticia-item-lateral .titulo {
    font-size: 0.82rem;
    font-weight: 500;
    line-height: 1.35;
    color: var(--texto);
    margin-bottom: 0.3rem;
  }

  .noticia-item-lateral .meta {
    font-size: 0.68rem;
    color: var(--texto-suave);
  }

  /* GRID DE NOTICIAS */
  .noticias-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 1px;
  }

  .noticia-card {
    background: var(--cinza-escuro);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    overflow: hidden;
  }

  .noticia-card:hover { background: var(--cinza-medio); }

  .noticia-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: var(--cinza-claro);
    display: block;
  }

  .noticia-card-body {
    padding: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .noticia-card-body .tag {
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--vermelho);
  }

  .noticia-card-body .titulo {
    font-size: 0.85rem;
    font-weight: 500;
    line-height: 1.4;
    color: var(--texto);
    flex: 1;
  }

  .noticia-card-body .meta {
    font-size: 0.68rem;
    color: var(--texto-suave);
    margin-top: auto;
  }

  .noticias-secao-titulo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--texto-suave);
    padding: 1.2rem 0 0.6rem;
    border-top: 1px solid #1a1a1a;
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .noticias-secao-titulo::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1a1a1a;
  }

  @media (max-width: 768px) {
    .noticias-hero { grid-template-columns: 1fr; }
    .noticias-lista-lateral { display: none; }
    .noticias-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 480px) {
    .noticias-grid { grid-template-columns: 1fr; }
  }

  /* TABELA CLASSIFICACAO */
  .camp-bloco { margin-bottom: 2.5rem; }

  .camp-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.7rem;
    flex-wrap: wrap;
  }

  .camp-titulo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    color: var(--branco);
  }

  .camp-badge {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.22rem 0.65rem;
    border-radius: 2px;
  }

  .camp-badge.em-andamento { background: rgba(76,175,80,0.15); color: #4CAF50; border: 1px solid rgba(76,175,80,0.3); }
  .camp-badge.semifinal    { background: rgba(200,168,75,0.15); color: var(--dourado); border: 1px solid rgba(200,168,75,0.3); }
  .camp-badge.hoje         { background: rgba(204,0,0,0.15); color: var(--vermelho); border: 1px solid rgba(204,0,0,0.3); animation: pulse-green 1.5s infinite; }

  .camp-fase-info {
    font-size: 0.75rem;
    color: var(--texto-suave);
    padding: 0.55rem 1rem;
    background: var(--cinza-medio);
    border-radius: 4px;
    border-left: 3px solid var(--dourado);
    margin-bottom: 0.8rem;
    line-height: 1.5;
  }

  .camp-fase-info strong { color: var(--dourado); }

  .mata-mata-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 1.2rem;
  }

  @media (max-width: 600px) { .mata-mata-grid { grid-template-columns: 1fr; } }

  .mm-card {
    background: var(--cinza-escuro);
    padding: 0.85rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-size: 0.82rem;
    transition: background 0.15s;
  }

  .mm-card:hover { background: var(--cinza-medio); }
  .mm-card.spfc { background: rgba(204,0,0,0.07); border-left: 3px solid var(--vermelho); }

  .mm-card .confronto { flex: 1; line-height: 1.4; }
  .mm-card .confronto strong { color: var(--branco); }
  .mm-card .confronto span { color: var(--texto-suave); font-size: 0.72rem; display: block; }

  .mm-fase {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.18rem 0.5rem;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .mm-fase.hoje { color: var(--vermelho); background: rgba(204,0,0,0.15); }
  .mm-fase.classificado { color: #4CAF50; background: rgba(76,175,80,0.12); }
  .mm-fase.aguardando { color: var(--texto-suave); background: var(--cinza-claro); }

  .classificacao-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }

  .classificacao-table th {
    padding: 0.65rem 1rem;
    text-align: left;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--texto-suave);
    background: #0f0f0f;
    border-bottom: 1px solid #1a1a1a;
  }

  .classificacao-table th:not(:first-child) { text-align: center; }

  .classificacao-table td {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #111;
    background: var(--cinza-escuro);
  }

  .classificacao-table td:not(:first-child):not(:nth-child(2)) { text-align: center; }

  .classificacao-table tr:hover td { background: var(--cinza-medio); }
  .classificacao-table tr.destaque td { background: rgba(204,0,0,0.08); }
  .classificacao-table tr.destaque td:first-child { border-left: 3px solid var(--vermelho); }
  .classificacao-table tr.rebaixado td { opacity: 0.45; }

  .pos-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--texto-suave);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .pos-indicador {
    width: 3px;
    height: 16px;
    border-radius: 2px;
  }

  .pos-indicador.libert { background: #1e88e5; }
  .pos-indicador.sulam  { background: #43a047; }
  .pos-indicador.rebaixamento { background: #e53935; }
  .pos-indicador.neutro { background: transparent; }

  .time-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .time-row img {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }

  .form-pills {
    display: flex;
    gap: 2px;
    justify-content: center;
  }

  .fp {
    width: 15px;
    height: 15px;
    border-radius: 2px;
    font-size: 0.58rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .fp.V { background: #4CAF50; }
  .fp.E { background: #777; }
  .fp.D { background: #CC0000; }

  .legenda-tabela {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    padding: 0.6rem 0.2rem;
    font-size: 0.68rem;
    color: var(--texto-suave);
  }

  .legenda-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .legenda-dot {
    width: 8px;
    height: 8px;
    border-radius: 1px;
  }

  /* FOOTER */
  footer {
    max-width: 1100px;
    margin: 3rem auto 0;
    padding: 1.5rem 2rem;
    border-top: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  footer p {
    font-size: 0.72rem;
    color: var(--texto-suave);
  }

  footer a {
    color: var(--dourado);
    text-decoration: none;
  }

  footer a:hover { text-decoration: underline; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .jogo-card {
      grid-template-columns: 1fr;
      gap: 0.8rem;
      padding: 1.2rem;
    }

    .placar-container { justify-content: flex-start; }
    .jogo-detalhe { text-align: left; }
    .header-right { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-bg"></div>
  <div class="header-inner">
    <!-- Escudo SVG simplificado do São Paulo -->
    <div class="escudo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,5 95,28 95,72 50,95 5,72 5,28" fill="#CC0000"/>
        <polygon points="50,12 88,32 88,68 50,88 12,68 12,32" fill="white"/>
        <polygon points="50,20 80,36 80,64 50,80 20,64 20,36" fill="#CC0000"/>
        <text x="50" y="57" font-family="Arial Black" font-size="18" fill="white" text-anchor="middle" font-weight="900">SPFC</text>
      </svg>
    </div>
    <div class="header-text">

<script>
// =====================================================
// API CONFIGURATION — ge.globo.com endpoints
// =====================================================
const GE_API = 'https://api.ge.globo.com';
const SPFC_ID = 280; // São Paulo FC ID no sistema Globo

// CORS proxy para contornar restrições
const PROXY = 'https://api.allorigins.win/raw?url=';

async function fetchGlobo(path) {
  const url = `${GE_API}${path}`;
  const res = await fetch(PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// =====================================================
// TABS
// =====================================================
function mudarTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  document.getElementById('tabJogos').style.display = tab === 'jogos' ? '' : 'none';
  document.getElementById('tabClassificacao').style.display = tab === 'classificacao' ? '' : 'none';
  document.getElementById('tabNoticias').style.display = tab === 'noticias' ? '' : 'none';

  if (tab === 'classificacao') carregarClassificacao();
  if (tab === 'noticias') carregarNoticias();
}
// =====================================================
// JOGOS
// =====================================================
async function carregarJogos() {
  const btn = document.getElementById('btnAtualizar');
  const icon = document.getElementById('btnIcon');
  btn.classList.add('loading');
  icon.classList.add('spin');

  try {
    // Tenta buscar jogos recentes e próximos do São Paulo
    const data = await fetchGlobo(`/team/matches?id=${SPFC_ID}&limit=20`);
    renderJogos(data);
  } catch (e) {
    // Fallback: busca pelo slug
    try {
      const data = await fetchGlobo(`/team/sao-paulo/matches?limit=20`);
      renderJogos(data);
    } catch (e2) {
      // Se APIs diretas falharem, tenta endpoint alternativo
      try {
        const res = await fetch(PROXY + encodeURIComponent('https://www.espn.com.br/futebol/time/calendario/_/id/126/sao-paulo'));
        usarDadosMockEnriquecidos();
      } catch(e3) {
        usarDadosMockEnriquecidos();
      }
    }
  } finally {
    btn.classList.remove('loading');
    icon.classList.remove('spin');
    const agora = new Date();
    document.getElementById('ultimaAtt').textContent =
      `Atualizado às ${agora.getHours().toString().padStart(2,'0')}:${agora.getMinutes().toString().padStart(2,'0')}`;
  }
}

function renderJogos(data) {
  // Normaliza diferentes formatos de resposta da API Globo
  let jogos = [];

  if (Array.isArray(data)) jogos = data;
  else if (data.matches) jogos = data.matches;
  else if (data.data) jogos = data.data;
  else if (data.items) jogos = data.items;

  if (jogos.length === 0) {
    usarDadosMockEnriquecidos();
    return;
  }

  const html = jogos.slice(0, 15).map(j => renderCardJogo(j)).join('');
  document.getElementById('conteudoJogos').innerHTML = `<div class="jogos-grid">${html}</div>`;
  setStatus('verde', `${jogos.length} jogos carregados`);
}

function renderCardJogo(j) {
  // Normaliza campos da API
  const mandante = j.mandante || j.home_team || j.home || {};
  const visitante = j.visitante || j.away_team || j.away || {};
  const nomeMandante = mandante.nome || mandante.name || mandante.nome_popular || 'Time A';
  const nomeVisitante = visitante.nome || visitante.name || visitante.nome_popular || 'Time B';
  const escudoMandante = mandante.escudo || mandante.logo || mandante.shield || '';
  const escudoVisitante = visitante.escudo || visitante.logo || visitante.shield || '';
  const placarM = j.placar_mandante ?? j.score_home ?? j.placar?.mandante ?? null;
  const placarV = j.placar_visitante ?? j.score_away ?? j.placar?.visitante ?? null;
  const status = j.status || j.game_status || '';
  const competicao = j.campeonato?.nome || j.championship?.name || j.competition?.name || 'Campeonato';
  const dataJogo = j.data_realizacao || j.date || j.game_date || '';
  const estadio = j.estadio?.nome_popular || j.venue?.name || j.stadium || '';

  const isAoVivo = status === 'ao_vivo' || status === 'live' || status === 'in_progress';
  const isEncerrado = status === 'encerrado' || status === 'finished' || status === 'FT';
  const isFuturo = !isAoVivo && !isEncerrado;

  let resultClass = '';
  let statusLabel = '';

  if (isAoVivo) {
    const minuto = j.minuto_atual || j.current_minute || '';
    statusLabel = `🔴 AO VIVO${minuto ? ' · ' + minuto + "'" : ''}`;
    resultClass = 'live';
  } else if (isEncerrado && placarM !== null) {
    // Descobre se SPFC é mandante ou visitante
    const spfcEhMandante = (nomeMandante.toLowerCase().includes('são paulo') || nomeMandante.toLowerCase().includes('sao paulo'));
    const golsSPFC = spfcEhMandante ? placarM : placarV;
    const golsAdv = spfcEhMandante ? placarV : placarM;

    if (golsSPFC > golsAdv) { resultClass = 'vitoria'; statusLabel = '✓ Vitória'; }
    else if (golsSPFC < golsAdv) { resultClass = 'derrota'; statusLabel = '✗ Derrota'; }
    else { resultClass = 'empate'; statusLabel = '— Empate'; }
  } else {
    const dataFormatada = dataJogo ? formatarData(dataJogo) : 'Em breve';
    statusLabel = dataFormatada;
  }

  const placarHTML = (placarM !== null && placarV !== null)
    ? `<div class="placar">
        <span class="placar-num">${placarM}</span>
        <span class="placar-sep">×</span>
        <span class="placar-num">${placarV}</span>
      </div>`
    : `<div class="placar-futuro">${formatarHora(dataJogo)}</div>`;

  const imgMandante = escudoMandante
    ? `<img class="time-escudo" src="${escudoMandante}" onerror="this.style.display='none'" alt="${nomeMandante}">`
    : `<div style="width:40px;height:40px;background:var(--cinza-claro);border-radius:50%;"></div>`;

  const imgVisitante = escudoVisitante
    ? `<img class="time-escudo" src="${escudoVisitante}" onerror="this.style.display='none'" alt="${nomeVisitante}">`
    : `<div style="width:40px;height:40px;background:var(--cinza-claro);border-radius:50%;"></div>`;

  return `
  <a class="jogo-card ${isAoVivo ? 'ao-vivo' : ''}" 
     href="https://ge.globo.com" target="_blank" rel="noopener">
    <div class="jogo-meta">
      <span class="jogo-competicao">${competicao}</span>
      <span class="jogo-data">${formatarDataCompleta(dataJogo)}</span>
      <span class="jogo-status ${resultClass}">${statusLabel}</span>
    </div>
    <div class="placar-container">
      <div class="time-info">
        ${imgMandante}
        <span class="time-nome">${nomeMandante}</span>
      </div>
      ${placarHTML}
      <div class="time-info">
        ${imgVisitante}
        <span class="time-nome">${nomeVisitante}</span>
      </div>
    </div>
    <div class="jogo-detalhe">
      ${estadio ? `<div class="jogo-estadio">${estadio}</div>` : ''}
    </div>
  </a>`;
}

// =====================================================
// CLASSIFICAÇÃO
// =====================================================
async function carregarClassificacao() {
  const el = document.getElementById('conteudoClassificacao');

  try {
    const data = await fetchGlobo(`/championship/brasileirao-serie-a/classification?season=2025`);
    renderClassificacao(data);
  } catch(e) {
    try {
      const data2 = await fetchGlobo(`/championship/campeonato-brasileiro/ranking`);
      renderClassificacao(data2);
    } catch(e2) {
      renderClassificacaoMock();
    }
  }
}

function renderClassificacao(data) {
  let times = [];
  if (Array.isArray(data)) times = data;
  else if (data.classification) times = data.classification;
  else if (data.standings) times = data.standings;
  else if (data.data) times = data.data;

  if (times.length === 0) { renderClassificacaoMock(); return; }

  const rows = times.map((t, i) => {
    const nome = t.team?.nome || t.team?.name || t.nome || t.name || 'Time';
    const isSP = nome.toLowerCase().includes('são paulo') || nome.toLowerCase().includes('sao paulo');
    const pts = t.points || t.pontos || 0;
    const pg = t.games || t.jogos || 0;
    const v = t.wins || t.vitorias || 0;
    const e = t.draws || t.empates || 0;
    const d = t.losses || t.derrotas || 0;
    const gp = t.goals_for || t.gols_pro || 0;
    const gc = t.goals_against || t.gols_contra || 0;
    const sg = t.goal_difference || (gp - gc);
    const escudo = t.team?.escudo || t.team?.logo || '';
    const pos = t.position || t.posicao || (i + 1);

    return `
    <tr ${isSP ? 'class="destaque"' : ''}>
      <td><span class="pos-num">${pos}</span></td>
      <td>
        <div class="time-row">
          ${escudo ? `<img src="${escudo}" onerror="this.style.display='none'" alt="">` : ''}
          <span style="${isSP ? 'color:var(--branco);font-weight:500' : ''}">${nome}</span>
        </div>
      </td>
      <td style="font-weight:600;color:var(--branco)">${pts}</td>
      <td>${pg}</td><td>${v}</td><td>${e}</td><td>${d}</td>
      <td>${gp}</td><td>${gc}</td>
      <td style="${sg > 0 ? 'color:#4CAF50' : sg < 0 ? 'color:var(--vermelho)' : ''}">${sg > 0 ? '+' : ''}${sg}</td>
    </tr>`;
  }).join('');

  document.getElementById('conteudoClassificacao').innerHTML = `
    <table class="classificacao-table">
      <thead>
        <tr>
          <th>#</th><th>Time</th><th>Pts</th><th>PJ</th>
          <th>V</th><th>E</th><th>D</th>
          <th>GP</th><th>GC</th><th>SG</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// =====================================================
// NOTÍCIAS
// =====================================================
// =====================================================
// NOTÍCIAS — RSS do GE Globo + Claude API fallback
// =====================================================
let noticiasCarregadas = false;

async function carregarNoticias() {
  if (noticiasCarregadas) return;
  const el = document.getElementById('conteudoNoticias');

  // Tenta múltiplas fontes RSS do GE Globo sobre São Paulo
  const feeds = [
    'https://ge.globo.com/dynamo/futebol/times/sao-paulo/atom.xml',
    'https://ge.globo.com/futebol/times/sao-paulo/index/feed/pagina-1.ghtml',
    'https://ge.globo.com/rss/futebol/times/sao-paulo/',
  ];

  let noticias = [];

  for (const feed of feeds) {
    try {
      const res = await fetch(PROXY + encodeURIComponent(feed));
      const text = await res.text();

      // Tenta parsear como XML (Atom/RSS)
      if (text.trim().startsWith('<')) {
        noticias = parsearRSS(text);
        if (noticias.length > 0) break;
      }
      // Tenta parsear como JSON (feed Globo)
      else {
        const json = JSON.parse(text);
        noticias = parsearFeedGloboJSON(json);
        if (noticias.length > 0) break;
      }
    } catch(e) { continue; }
  }

  // Fallback: buscar via Claude API com noticias reais
  if (noticias.length === 0) {
    await buscarNoticiasViaClaude();
    return;
  }

  renderNoticiasLayout(noticias);
  noticiasCarregadas = true;
}

function parsearRSS(xmlText) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const items = doc.querySelectorAll('item, entry');
    const result = [];

    items.forEach(item => {
      const titulo = item.querySelector('title')?.textContent?.trim() || '';
      const link = item.querySelector('link')?.textContent?.trim() ||
                   item.querySelector('link')?.getAttribute('href') || '#';
      const desc = item.querySelector('description, summary, content')?.textContent?.trim() || '';
      const data = item.querySelector('pubDate, published, updated')?.textContent?.trim() || '';
      // Imagem do media:thumbnail ou enclosure
      const thumb = item.querySelector('thumbnail')?.getAttribute('url') ||
                    item.querySelector('enclosure')?.getAttribute('url') ||
                    extrairImagem(desc) || '';
      const categoria = item.querySelector('category')?.textContent?.trim() || 'São Paulo FC';

      if (titulo) result.push({ titulo, link, desc, data, thumb, categoria });
    });

    return result;
  } catch(e) { return []; }
}

function parsearFeedGloboJSON(json) {
  try {
    let items = json.items || json.results || json.data || json.news || [];
    if (!Array.isArray(items)) return [];

    return items.map(i => ({
      titulo: i.title || i.titulo || i.headline || '',
      link: i.url || i.link || i.href || 'https://ge.globo.com/futebol/times/sao-paulo/',
      desc: i.summary || i.description || i.resumo || '',
      data: i.published_at || i.created_at || i.data || i.date || '',
      thumb: i.image?.url || i.image || i.thumbnail || i.imagem || '',
      categoria: i.label || i.section || i.category || 'São Paulo FC',
    })).filter(i => i.titulo);
  } catch(e) { return []; }
}

function extrairImagem(html) {
  const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
  return match ? match[1] : '';
}

async function buscarNoticiasViaClaude() {
  const el = document.getElementById('conteudoNoticias');
  el.innerHTML = `<div class="loading-state">
    <div class="loading-spinner"></div>
    <p>Buscando notícias em tempo real...</p>
  </div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{
          role: "user",
          content: `Busque as últimas 8 notícias do São Paulo FC no ge.globo.com dos últimos 7 dias. 
          Responda APENAS em JSON puro sem markdown, formato:
          [{"titulo":"...","link":"...","data":"DD/MM/YYYY","categoria":"...","desc":"resumo curto"}]
          Use links reais do ge.globo.com`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.filter(c => c.type === 'text').map(c => c.text).join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const noticias = JSON.parse(clean);

    if (Array.isArray(noticias) && noticias.length > 0) {
      renderNoticiasLayout(noticias);
      noticiasCarregadas = true;
      return;
    }
  } catch(e) {}

  renderNoticiasMock();
  noticiasCarregadas = true;
}

function renderNoticiasLayout(noticias) {
  if (!noticias || noticias.length === 0) { renderNoticiasMock(); return; }

  const destaque = noticias[0];
  const laterais = noticias.slice(1, 4);
  const resto = noticias.slice(4, 13);

  const imgDestaque = destaque.thumb || 'https://conteudo.imguol.com.br/c/esporte/futebol/times/desktop/sao-paulo.png';
  const dataDestaque = formatarDataRelativa(destaque.data);

  const heroHTML = `
  <div class="noticias-hero">
    <a class="noticia-destaque" href="${destaque.link}" target="_blank" rel="noopener">
      <img class="noticia-destaque-img" src="${imgDestaque}" 
           onerror="this.src='https://conteudo.imguol.com.br/c/esporte/futebol/times/desktop/sao-paulo.png'" 
           alt="${destaque.titulo}">
      <div class="noticia-destaque-overlay"></div>
      <div class="noticia-destaque-body">
        <span class="tag">${destaque.categoria || 'São Paulo FC'}</span>
        <h2>${destaque.titulo}</h2>
        ${destaque.desc ? `<p style="font-size:0.8rem;color:rgba(255,255,255,0.65);margin-bottom:0.4rem;line-height:1.4">${destaque.desc.substring(0,120)}${destaque.desc.length>120?'...':''}</p>` : ''}
        <span class="meta">ge.globo.com · ${dataDestaque}</span>
      </div>
    </a>
    <div class="noticias-lista-lateral">
      ${laterais.map(n => {
        const img = n.thumb || '';
        return `
        <a class="noticia-item-lateral" href="${n.link}" target="_blank" rel="noopener">
          ${img ? `<img src="${img}" onerror="this.style.display='none'" alt="">` : ''}
          <div>
            <div class="titulo">${n.titulo}</div>
            <div class="meta">${formatarDataRelativa(n.data)}</div>
          </div>
        </a>`;
      }).join('')}
    </div>
  </div>`;

  const gridHTML = resto.length > 0 ? `
  <div class="noticias-secao-titulo">Mais notícias</div>
  <div class="noticias-grid">
    ${resto.map(n => {
      const img = n.thumb || '';
      return `
      <a class="noticia-card" href="${n.link}" target="_blank" rel="noopener">
        ${img ? `<img src="${img}" onerror="this.style.display='none'" alt="">` : ''}
        <div class="noticia-card-body">
          <span class="tag">${n.categoria || 'São Paulo FC'}</span>
          <div class="titulo">${n.titulo}</div>
          <div class="meta">ge.globo.com · ${formatarDataRelativa(n.data)}</div>
        </div>
      </a>`;
    }).join('')}
  </div>` : '';

  const rodape = `<p style="padding:1rem 0;font-size:0.72rem;color:var(--texto-suave);text-align:center">
    Notícias via <a href="https://ge.globo.com/futebol/times/sao-paulo/" target="_blank" style="color:var(--dourado)">ge.globo.com</a>
  </p>`;

  document.getElementById('conteudoNoticias').innerHTML = heroHTML + gridHTML + rodape;
}

function setStatus(cor, texto) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTexto');
  dot.className = `dot ${cor}`;
  txt.textContent = texto;
}

function formatarDataRelativa(iso) {
  if (!iso) return 'ge.globo.com';
  try {
    const d = new Date(iso);
    const agora = new Date();
    const diff = agora - d;
    const min = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const dias = Math.floor(diff / 86400000);
    if (min < 2) return 'Agora mesmo';
    if (min < 60) return `Há ${min} min`;
    if (h < 24) return `Há ${h}h`;
    if (dias === 1) return 'Ontem';
    if (dias < 7) return `Há ${dias} dias`;
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
  } catch(e) { return iso; }
}

function formatarData(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch(e) { return iso; }
}

function formatarDataCompleta(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
  } catch(e) { return iso; }
}

function formatarHora(iso) {
  if (!iso) return '--:--';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return '--:--'; }
}
